<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChineseFlix — 看电影学中文</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span class="logo">🎬 ChineseFlix</span>
    <div style="flex:1"></div>
    <div x-data="{ lang: Storage.getSettings().preferredLanguage || 'mandarin' }" class="lang-selector">
      <button class="lang-option" :class="{ active: lang === 'mandarin' }"
        @click="lang = 'mandarin'; Storage.saveSettings({ preferredLanguage: 'mandarin' }); $dispatch('lang-change', 'mandarin')">普通话</button>
      <button class="lang-option" :class="{ active: lang === 'cantonese' }"
        @click="lang = 'cantonese'; Storage.saveSettings({ preferredLanguage: 'cantonese' }); $dispatch('lang-change', 'cantonese')">粤语</button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="page-container" x-data="homePage()" x-init="init()">

    <!-- Hero Banner -->
    <div class="hero-banner">
      <div class="hero-text">
        <div class="hero-title">看电影，学中文</div>
        <div class="hero-subtitle">Learn Chinese through real conversations</div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat" x-text="stats.total + ' 个视频'"></div>
        <div class="hero-stat" x-text="stats.languages"></div>
        <div class="hero-stat" x-text="stats.levels + ' 个级别'"></div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input type="text" class="search-box" x-model="searchQuery" placeholder="搜索视频标题、描述...">
    </div>

    <!-- Filter Bar: Language -->
    <div class="filter-section">
      <span class="filter-label">语言</span>
      <div class="filter-bar">
        <button class="filter-btn" :class="{ active: langFilter === 'all' }" @click="langFilter = 'all'">全部</button>
        <button class="filter-btn" :class="{ active: langFilter === 'mandarin' }" @click="langFilter = 'mandarin'">普通话</button>
        <button class="filter-btn" :class="{ active: langFilter === 'cantonese' }" @click="langFilter = 'cantonese'">粤语</button>
      </div>
    </div>

    <!-- Filter Bar: Difficulty -->
    <div class="filter-section">
      <span class="filter-label">难度</span>
      <div class="filter-bar">
        <button class="filter-btn" :class="{ active: diffFilter === 'all' }" @click="diffFilter = 'all'">全部</button>
        <button class="filter-btn" :class="{ active: diffFilter === 'beginner' }" @click="diffFilter = 'beginner'">初级</button>
        <button class="filter-btn" :class="{ active: diffFilter === 'intermediate' }" @click="diffFilter = 'intermediate'">中级</button>
        <button class="filter-btn" :class="{ active: diffFilter === 'advanced' }" @click="diffFilter = 'advanced'">高级</button>
      </div>
    </div>

    <!-- Result Summary -->
    <div class="result-summary" x-show="!loading">
      <span x-text="resultText"></span>
      <button x-show="langFilter !== 'all' || diffFilter !== 'all' || searchQuery" class="btn btn-sm btn-outline" @click="clearFilters()">清除筛选</button>
    </div>

    <!-- Loading -->
    <div x-show="loading" x-html="renderSpinner('加载视频中...')"></div>

    <!-- Empty -->
    <div x-show="!loading && filtered.length === 0" x-html="renderEmptyState('📭', '没有找到匹配的视频', '试试调整筛选条件')"></div>

    <!-- Video Grid -->
    <div class="video-grid" x-show="!loading && filtered.length > 0">
      <template x-for="v in filtered" :key="v.id">
        <div class="card video-card" @click="goTo('watch.html?id=' + v.id)">
          <div class="card-img-wrapper">
            <img class="card-img"
              :src="v.thumbnail || 'https://img.youtube.com/vi/' + v.sourceId + '/hqdefault.jpg'"
              :alt="v.title" loading="lazy"
              @error="v.thumbnail = null; $el.src = ''; $el.parentElement.classList.add('no-thumb')">
            <div class="card-img-tag tag" :class="'tag-' + v.language" x-text="v.language === 'cantonese' ? '粤' : '普'"></div>
            <div class="card-duration" x-text="v.duration"></div>
          </div>
          <div class="card-body">
            <div class="card-title" x-text="v.title"></div>
            <div class="card-desc" x-text="v.description"></div>
            <div class="card-meta">
              <span class="tag" :class="'tag-' + v.difficulty" x-text="diffLabel(v.difficulty)"></span>
              <span x-text="v.subtitle_cn"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a class="tab-item active" href="index.html">
      <span class="tab-icon">🏠</span>首页
    </a>
    <a class="tab-item" href="vocabulary.html">
      <span class="tab-icon">📖</span>生词
    </a>
    <a class="tab-item" href="daily.html">
      <span class="tab-icon">🗣️</span>每日
    </a>
    <a class="tab-item" href="profile.html">
      <span class="tab-icon">👤</span>我的
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components/ui.js"></script>
  <script src="js/data.js"></script>
  <script>
    function homePage() {
      return {
        videos: [],
        searchQuery: '',
        langFilter: 'all',
        diffFilter: 'all',
        loading: true,

        async init() {
          this.videos = await loadVideos();
          this.loading = false;
          Alpine.store('user').init();
        },

        get filtered() {
          let list = this.videos;
          if (this.langFilter !== 'all') {
            list = list.filter(v => v.language === this.langFilter);
          }
          if (this.diffFilter !== 'all') {
            list = list.filter(v => v.difficulty === this.diffFilter);
          }
          if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            list = list.filter(v =>
              v.title.toLowerCase().includes(q) ||
              (v.description || '').toLowerCase().includes(q) ||
              (v.subtitle_cn || '').toLowerCase().includes(q)
            );
          }
          return list;
        },

        get stats() {
          const total = this.videos.length;
          const mandarin = this.videos.filter(v => v.language === 'mandarin').length;
          const cantonese = this.videos.filter(v => v.language === 'cantonese').length;
          const levels = new Set(this.videos.map(v => v.difficulty)).size;
          const langParts = [];
          if (mandarin) langParts.push(mandarin + ' 普通话');
          if (cantonese) langParts.push(cantonese + ' 粤语');
          return { total, languages: langParts.join(' · '), levels };
        },

        get resultText() {
          const total = this.videos.length;
          const showing = this.filtered.length;
          if (this.langFilter === 'all' && this.diffFilter === 'all' && !this.searchQuery) {
            return `共 ${total} 个视频`;
          }
          return `找到 ${showing} 个视频（共 ${total} 个）`;
        },

        diffLabel(d) {
          const map = { beginner: '初级', intermediate: '中级', advanced: '高级' };
          return map[d] || d;
        },

        clearFilters() {
          this.searchQuery = '';
          this.langFilter = 'all';
          this.diffFilter = 'all';
        },
      };
    }
  </script>
</body>
</html>
