<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观看 — ChineseFlix</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <a class="back-btn" href="index.html">← 返回</a>
    <span class="header-title" id="videoTitle">加载中...</span>
    <div style="flex:1"></div>
    <span class="streak-display small" x-data x-show="Alpine.store('user')?.streak?.count > 0"
      x-text="'🔥 ' + (Alpine.store('user')?.streak?.count || 0)"></span>
  </header>

  <div class="page-container" x-data="watchPage()" x-init="init()">

    <!-- Loading -->
    <div x-show="loading" style="text-align:center;padding:40px;">
      <div class="spinner"></div>
      <div style="margin-top:12px;color:var(--text-secondary);">加载视频中...</div>
    </div>

    <!-- Error -->
    <div x-show="error" style="text-align:center;padding:48px 20px;">
      <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
      <div style="font-size:0.95rem;" x-text="error"></div>
      <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">
        <a href="index.html">← 返回首页</a>
      </div>
    </div>

    <!-- Coming Soon -->
    <div x-show="comingSoon" style="text-align:center;padding:48px 20px;">
      <div style="font-size:3rem;margin-bottom:12px;">🚧</div>
      <div style="font-size:1.1rem;font-weight:600;margin-bottom:8px;">即将上线</div>
      <div style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto;" x-text="video?.description || '该视频正在筹备中，敬请期待！'"></div>
      <a href="index.html" class="btn btn-primary">← 返回首页</a>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error && !comingSoon">

      <!-- YouTube Availability Notice -->
      <div id="youtubeNotice" style="display:none;background:#FFF3CD;color:#856404;padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:12px;font-size:0.85rem;text-align:center;">
        ⚠️ 您所在的地区可能无法直接播放 YouTube 视频，请使用网络工具或等待我们接入国内视频源。
      </div>

      <!-- Video Player -->
      <div class="video-wrapper" id="playerContainer">
        <div id="player"></div>
      </div>

      <!-- Active line learning panel -->
      <section class="line-study-panel" x-show="activeSub">
        <div style="width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden;">
          <div style="height:100%;background:var(--primary);border-radius:2px;transition:width 0.3s ease;"
            :style="'width:' + ((activeIndex + 1) / subtitles.length * 100) + '%'"></div>
        </div>
        <div class="line-study-meta">
          <span class="tag" :class="'tag-' + (video?.language || '')" x-text="video?.language === 'cantonese' ? '粤语主课' : '普通话主课'"></span>
          <span x-text="video?.scene || activeSub?.scene || '港片场景'"></span>
          <span x-show="activeSub?.tone" x-text="activeSub?.tone"></span>
        </div>

        <div class="line-cantonese" x-text="activeSub?.cantonese || activeSub?.text"></div>
        <div class="line-jyutping" x-text="activeSub?.jyutping"></div>
        <div class="line-meaning">
          <div>
            <span>普通话</span>
            <strong x-text="activeSub?.mandarin || activeSub?.translation"></strong>
          </div>
          <div>
            <span>English</span>
            <strong x-text="activeSub?.english || activeSub?.translation"></strong>
          </div>
        </div>

        <div class="expression-notes" x-show="activeSub?.notes?.length">
          <template x-for="note in activeSub?.notes || []" :key="note.word">
            <button class="expression-chip" @click="saveExpression(note)">
              <span x-text="note.word"></span>
              <small x-text="note.meaning"></small>
            </button>
          </template>
        </div>

        <div class="line-actions">
          <button class="btn btn-secondary" @click="playActiveClip" x-text="t('replay')">重播本句</button>
          <button class="btn btn-outline" @click="setClipSpeed(0.75)" x-text="t('slow')">慢速</button>
          <button class="btn btn-primary" @click="openSpeak(activeSub)" x-text="t('speak')">跟读</button>
          <button class="btn btn-secondary" @click="saveActiveLine" x-text="t('save')">收藏整句</button>
        </div>

        <div class="line-nav">
          <button class="btn btn-sm btn-outline" @click="jumpRelative(-1)" x-text="t('prev')">上一句</button>
          <span x-text="(activeIndex + 1) + ' / ' + subtitles.length"></span>
          <button class="btn btn-sm btn-outline" @click="jumpRelative(1)" x-text="t('next')">下一句</button>
        </div>

        <div style="text-align:center;margin-top:16px;">
          <button class="btn btn-primary" style="width:100%;max-width:280px;" @click="checkIn" x-text="'✅ ' + t('checkIn')">✅ 完成学习，今日打卡</button>
        </div>
      </section>

      <!-- Subtitle List -->
      <div class="section-title">全部台词</div>
      <div class="subtitle-list" id="subtitleList"></div>

      <!-- Check-in -->
      <div style="text-align:center;padding:20px 0;">
        <button class="btn btn-primary btn-lg" @click="checkIn">✅ 完成学习，今日打卡</button>
      </div>
    </div>
  </div>

  <!-- Modal Container -->
  <div id="modalContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components/ui.js"></script>
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/components/player.js"></script>
  <script src="js/components/subtitles.js"></script>
  <script>
    // YouTube availability detection
    (function() {
      const img = new Image();
      const timeout = setTimeout(() => {
        img.src = '';
        const notice = document.getElementById('youtubeNotice');
        if (notice) notice.style.display = 'block';
      }, 3000);
      img.onload = () => clearTimeout(timeout);
      img.onerror = () => {
        clearTimeout(timeout);
        const notice = document.getElementById('youtubeNotice');
        if (notice) notice.style.display = 'block';
      };
      img.src = 'https://img.youtube.com/vi/SGS8sfH11yg/1.jpg?t=' + Date.now();
    })();

    function watchPage() {
      return {
        video: null,
        subtitles: [],
        loading: true,
        error: '',
        comingSoon: false,
        playerCtrl: null,
        subtitleMgr: null,
        activeSub: null,
        activeIndex: 0,

        async init() {
          const params = new URLSearchParams(window.location.search);
          const videoId = params.get('id');
          if (!videoId) { this.error = '未指定视频ID'; this.loading = false; return; }

          const videoList = await loadVideos();
          const v = videoList.find(item => item.id === videoId) || getVideoById(videoId);
          if (!v) { this.error = '视频未找到'; this.loading = false; return; }
          this.video = v;

          if (v.comingSoon) {
            this.comingSoon = true;
            this.loading = false;
            document.title = v.title + ' — ChineseFlix';
            document.getElementById('videoTitle').textContent = v.title;
            return;
          }

          const subs = await loadSubtitles(videoId);
          if (!subs.length) { this.error = '该视频暂无字幕，我们正在努力制作中，敬请期待！'; this.loading = false; return; }
          this.subtitles = subs;
          this.activeSub = subs[0] || null;

          document.title = v.title + ' — ChineseFlix';
          document.getElementById('videoTitle').textContent = v.title;
          this.loading = false;

          // Init player after DOM renders
          this.$nextTick(() => {
            this.playerCtrl = createPlayer('player', v, {
              onPlay: () => this.subtitleMgr?.startSync(),
              onPause: () => this.subtitleMgr?.stopSync(),
              onSeeked: () => this.subtitleMgr?.updateActive(),
              onEnded: () => this.subtitleMgr?.stopSync(),
            });

            this.subtitleMgr = createSubtitles({
              containerId: 'subtitleList',
              subtitles: subs,
              playerCtrl: this.playerCtrl,
              language: v.language,
              onActiveChange: (sub) => this.setActiveSub(sub),
            });

            // Bind click events
            this.subtitleMgr.onContainerClick((e) => {
              const speakBtn = e.target.closest('.btn-speak');
              if (speakBtn) {
                e.stopPropagation();
                const subId = parseInt(speakBtn.dataset.speakId);
                const sub = subs.find(s => s.id === subId);
                if (sub) this.openSpeak(sub);
                return;
              }
              const line = e.target.closest('.subtitle-line');
              if (line && this.playerCtrl) {
                const start = parseFloat(line.dataset.start);
                const subId = parseInt(line.dataset.subId);
                const sub = subs.find(s => s.id === subId);
                if (sub) this.setActiveSub(sub);
                if (!isNaN(start)) {
                  this.playerCtrl.seek(start);
                  this.playerCtrl.play();
                }
              }
              const charEl = e.target.closest('.char-clickable');
              if (charEl) {
                e.stopPropagation();
                this.openVocab(charEl.dataset.char, charEl.dataset.source);
              }
            });

          });
        },

        setActiveSub(sub) {
          if (!sub) return;
          this.activeSub = sub;
          this.activeIndex = this.subtitles.findIndex(s => s.id === sub.id);
          // Save progress
          Storage.saveProgress(this.video.id, this.activeIndex, this.subtitles.length);
        },

        playActiveClip() {
          if (!this.activeSub) return;
          playClip(this.playerCtrl, this.activeSub.start, this.activeSub.end);
        },

        setClipSpeed(rate) {
          this.playerCtrl?.setSpeed(rate);
          this.playActiveClip();
        },

        jumpRelative(delta) {
          const nextIndex = Math.min(Math.max(this.activeIndex + delta, 0), this.subtitles.length - 1);
          const next = this.subtitles[nextIndex];
          if (!next) return;
          this.setActiveSub(next);
          this.playerCtrl?.seek(next.start);
          this.playerCtrl?.play();
          // Celebrate on finishing last sentence
          if (delta > 0 && nextIndex === this.subtitles.length - 1) {
            setTimeout(() => {
              showToast('🎉 ' + (t('checkedIn') || 'All sentences completed!'));
              Alpine.store('user').earnBadge('video_10');
            }, 800);
          }
        },

        saveExpression(note) {
          if (!note || !this.activeSub) return;
          Storage.addVocabWord(note.word, {
            romanization: this.activeSub.jyutping || '',
            pos: note.type || '表达',
            meaning: note.meaning || '',
            language: this.video.language,
          }, `${this.video.title} #${this.activeSub.id}`);
          showToast(`已收藏「${note.word}」`);
        },

        saveActiveLine() {
          if (!this.activeSub) return;
          const text = this.activeSub.cantonese || this.activeSub.text;
          Storage.addVocabWord(text, {
            romanization: this.activeSub.jyutping || '',
            pos: '整句表达',
            meaning: this.activeSub.mandarin || this.activeSub.translation || '',
            language: this.video.language,
          }, `${this.video.title} #${this.activeSub.id}`);
          showToast('已收藏整句表达');
        },

        openSpeak(sub) {
          AudioRecorder.cleanup();
          const html = `
            <div class="modal-overlay" id="speakOverlay">
              <div class="modal">
                <button class="modal-close" id="speakClose">✕</button>
                <div class="modal-title">🎤 跟读练习</div>
                <div class="speak-sentence">${sub.cantonese || sub.text}</div>
                <div style="text-align:center;margin-bottom:16px;color:var(--text-secondary);">${sub.mandarin || sub.translation}</div>
                <div class="speak-controls">
                  <button class="btn btn-outline btn-lg" id="playOrigBtn">🔊 播放原声</button>
                  <button class="btn btn-primary btn-lg" id="startRecBtn">🎙️ 开始录音</button>
                  <button class="btn btn-danger btn-lg" id="stopRecBtn" style="display:none;">
                    <span class="recording-indicator"></span> 停止录音
                  </button>
                  <div id="playbackArea" style="display:none;">
                    <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;">你的录音：</div>
                    <audio id="playbackAudio" controls></audio>
                  </div>
                </div>
                <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">
                  <button class="btn btn-outline" id="retryBtn">🔄 重录</button>
                  <button class="btn btn-primary" id="doneBtn">✓ 完成</button>
                </div>
              </div>
            </div>`;

          const close = openModal(html, { overlayId: 'speakOverlay' });

          setTimeout(() => {
            document.getElementById('speakClose').addEventListener('click', close);
            document.getElementById('doneBtn').addEventListener('click', () => {
              Alpine.store('user').addXP(CONFIG.XP.COMPLETE_SPEAK);
              showToast(`+${CONFIG.XP.COMPLETE_SPEAK} XP`);
              close();
            });

            document.getElementById('playOrigBtn').addEventListener('click', () => {
              playClip(this.playerCtrl, sub.start, sub.end);
            });

            document.getElementById('startRecBtn').addEventListener('click', async () => {
              try {
                await AudioRecorder.start();
                document.getElementById('startRecBtn').style.display = 'none';
                document.getElementById('stopRecBtn').style.display = '';
              } catch (e) {
                showToast('无法访问麦克风', 'error');
              }
            });

            document.getElementById('stopRecBtn').addEventListener('click', async () => {
              await AudioRecorder.stop();
              document.getElementById('stopRecBtn').style.display = 'none';
              const pb = document.getElementById('playbackArea');
              const audio = document.getElementById('playbackAudio');
              pb.style.display = '';
              audio.src = AudioRecorder.getPlaybackUrl();
            });

            document.getElementById('retryBtn').addEventListener('click', () => {
              AudioRecorder.cleanup();
              document.getElementById('startRecBtn').style.display = '';
              document.getElementById('stopRecBtn').style.display = 'none';
              document.getElementById('playbackArea').style.display = 'none';
            });
          }, 50);
        },

        openVocab(char, source) {
          const vocab = getVocab(char, this.video.language);
          const romanKey = this.video.language === 'cantonese' ? 'jyutping' : 'pinyin';
          const romanLabel = this.video.language === 'cantonese' ? '粤拼' : '拼音';

          const html = `
            <div class="modal-overlay" id="vocabOverlay">
              <div class="modal">
                <button class="modal-close" id="vocabClose">✕</button>
                <div class="vocab-char">${char}</div>
                ${vocab ? `
                  <div class="vocab-pinyin">${romanLabel}：${vocab[romanKey] || vocab.pinyin || ''}</div>
                  <div class="vocab-pos">${vocab.pos}</div>
                  <hr class="vocab-divider">
                  <div class="vocab-meaning">${vocab.meaning}</div>
                ` : `
                  <div class="vocab-pinyin">—</div>
                  <div class="vocab-pos" style="color:var(--text-secondary);">未知</div>
                  <hr class="vocab-divider">
                  <div class="vocab-meaning">暂无释义</div>
                `}
                <div class="vocab-actions">
                  ${vocab ? `<button class="btn btn-primary" id="saveVocabBtn">⭐ 收藏到生词本</button>` : ''}
                  <button class="btn btn-secondary" id="closeVocabBtn">关闭</button>
                </div>
              </div>
            </div>`;

          const close = openModal(html, { overlayId: 'vocabOverlay' });

          setTimeout(() => {
            document.getElementById('vocabClose')?.addEventListener('click', close);
            document.getElementById('closeVocabBtn')?.addEventListener('click', close);
            document.getElementById('saveVocabBtn')?.addEventListener('click', () => {
              if (vocab) {
                Storage.addVocabWord(char, {
                  ...vocab,
                  romanization: vocab[romanKey] || vocab.pinyin || '',
                  language: this.video.language,
                }, source);
                showToast(`已收藏「${char}」`);
              }
              close();
            });
          }, 50);
        },

        async checkIn() {
          await Alpine.store('user').checkIn();
          Alpine.store('user').addXP(CONFIG.XP.WATCH_VIDEO);
          showToast(`🔥 打卡成功！+${CONFIG.XP.WATCH_VIDEO} XP`);
        },
      };
    }
  </script>
</body>
</html>
