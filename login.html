<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — ChineseFlix</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-header">
    <a class="back-btn" href="profile.html">← 返回</a>
    <span class="header-title">登录 / 注册</span>
  </header>

  <div class="page-container" x-data="loginPage()">
    <div class="auth-form" x-show="!loading">

      <!-- Toggle -->
      <div style="display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:24px;">
        <button class="mode-option" style="flex:1;padding:10px;border-radius:10px;font-weight:600;font-size:0.9rem;"
          :style="isLogin ? 'background:var(--card-bg);color:var(--primary);box-shadow:var(--shadow-sm)' : ''"
          @click="isLogin = true">登录</button>
        <button class="mode-option" style="flex:1;padding:10px;border-radius:10px;font-weight:600;font-size:0.9rem;"
          :style="!isLogin ? 'background:var(--card-bg);color:var(--primary);box-shadow:var(--shadow-sm)' : ''"
          @click="isLogin = false">注册</button>
      </div>

      <!-- Error -->
      <div x-show="error" style="background:#FADBD8;color:#B03A2E;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:0.85rem;" x-text="error"></div>

      <!-- Form -->
      <div class="form-group" x-show="!isLogin">
        <label>昵称</label>
        <input type="text" x-model="username" placeholder="给自己取个名字">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" x-model="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" x-model="password" placeholder="至少 6 位密码">
      </div>

      <button class="btn btn-primary btn-lg" style="width:100%;" @click="submit" :disabled="submitting">
        <span x-show="!submitting" x-text="isLogin ? '登录' : '注册'"></span>
        <span x-show="submitting">处理中...</span>
      </button>

      <div class="auth-switch">
        <span x-show="isLogin">还没有账号？ <a href="#" @click.prevent="isLogin = false; error = ''">立即注册</a></span>
        <span x-show="!isLogin">已有账号？ <a href="#" @click.prevent="isLogin = true; error = ''">去登录</a></span>
      </div>

      <div style="text-align:center;margin-top:24px;font-size:0.8rem;color:var(--text-secondary);">
        社区功能需要登录使用。也可以 <a href="profile.html" style="color:var(--primary);">跳过</a> 离线使用。
      </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" x-html="renderSpinner('检查登录状态...')"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components/ui.js"></script>
  <script>
    function loginPage() {
      return {
        isLogin: true,
        email: '',
        password: '',
        username: '',
        error: '',
        submitting: false,
        loading: true,

        async init() {
          const user = await SupabaseAuth.getUser();
          if (user) {
            window.location.href = 'profile.html';
            return;
          }
          this.loading = false;
        },

        async submit() {
          this.error = '';
          if (!this.email || !this.password) {
            this.error = '请填写邮箱和密码';
            return;
          }
          if (this.password.length < 6) {
            this.error = '密码至少 6 位';
            return;
          }
          if (!this.isLogin && !this.username) {
            this.error = '请填写昵称';
            return;
          }

          this.submitting = true;
          try {
            if (this.isLogin) {
              await SupabaseAuth.signIn(this.email, this.password);
            } else {
              await SupabaseAuth.signUp(this.email, this.password, this.username);
              showToast('注册成功！请查看邮箱确认');
            }
            window.location.href = 'profile.html';
          } catch (e) {
            this.error = e.message || '操作失败，请重试';
          } finally {
            this.submitting = false;
          }
        },
      };
    }
  </script>
</body>
</html>
