<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChineseFlix — 用港片对白学粤语</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span class="logo">🎬 ChineseFlix</span>
    <div style="flex:1"></div>
    <div x-data="{ lang: Storage.getSettings().preferredLanguage || 'cantonese' }" class="lang-selector">
      <button class="lang-option" :class="{ active: lang === 'mandarin' }"
        @click="lang = 'mandarin'; Storage.saveSettings({ preferredLanguage: 'mandarin' }); $dispatch('lang-change', 'mandarin')">普通话</button>
      <button class="lang-option" :class="{ active: lang === 'cantonese' }"
        @click="lang = 'cantonese'; Storage.saveSettings({ preferredLanguage: 'cantonese' }); $dispatch('lang-change', 'cantonese')">粤语</button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="page-container" x-data="homePage()" x-init="init()">

    <!-- Hero Banner -->
    <div class="hero-banner">
      <div class="hero-text">
        <div class="hero-title">用港片对白学粤语</div>
        <div class="hero-subtitle">逐句听懂、跟读、收藏地道表达</div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat" x-text="stats.total + ' 个视频'"></div>
        <div class="hero-stat" x-text="stats.languages"></div>
        <div class="hero-stat" x-text="stats.levels + ' 个级别'"></div>
      </div>
    </div>

    <!-- Continue Learning -->
    <div x-show="lastWatchedVideo" class="continue-card" @click="goTo('watch.html?id=' + lastWatchedVideo.id)">
      <div class="continue-thumb">
        <img :src="lastWatchedVideo.thumbnail || (lastWatchedVideo.sourceId ? 'https://img.youtube.com/vi/' + lastWatchedVideo.sourceId + '/mqdefault.jpg' : '')"
          :alt="lastWatchedVideo.title" loading="lazy"
          @error="$el.parentElement.classList.add('no-thumb')">
      </div>
      <div class="continue-info">
        <div class="continue-label">📌 继续学习</div>
        <div class="continue-title" x-text="lastWatchedVideo.title"></div>
        <div class="continue-progress">
          <div class="progress-bar"><div class="progress-fill" :style="'width:' + lastWatchedPercent + '%'"></div></div>
          <span x-text="'已学 ' + lastWatchedProgress.index + '/' + lastWatchedProgress.total + ' 句'"></span>
        </div>
      </div>
      <div class="continue-arrow">▶</div>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input type="text" class="search-box" x-model="searchQuery" :placeholder="t('searchPlaceholder')">
    </div>

    <!-- Quick Tags -->
    <div class="quick-tags" x-show="!loading">
      <button class="quick-tag" @click="searchQuery = '问候'">#问候</button>
      <button class="quick-tag" @click="searchQuery = '点餐'">#点餐</button>
      <button class="quick-tag" @click="searchQuery = '问路'">#问路</button>
      <button class="quick-tag" @click="searchQuery = '购物'">#购物</button>
      <button class="quick-tag" @click="searchQuery = '天气'">#天气</button>
      <button class="quick-tag" @click="searchQuery = '面试'">#面试</button>
    </div>

    <!-- Filter Bar: Language -->
    <div class="filter-section">
      <span class="filter-label" x-text="t('all')">Lang</span>
      <div class="filter-bar">
        <button class="filter-btn" :class="{ active: langFilter === 'all' }" @click="langFilter = 'all'" x-text="t('all')">All</button>
        <button class="filter-btn" :class="{ active: langFilter === 'mandarin' }" @click="langFilter = 'mandarin'" x-text="t('mandarin')">Mandarin</button>
        <button class="filter-btn" :class="{ active: langFilter === 'cantonese' }" @click="langFilter = 'cantonese'" x-text="t('cantonese')">Cantonese</button>
      </div>
    </div>

    <!-- Filter Bar: Difficulty -->
    <div class="filter-section">
      <span class="filter-label">Lvl</span>
      <div class="filter-bar">
        <button class="filter-btn" :class="{ active: diffFilter === 'all' }" @click="diffFilter = 'all'" x-text="t('all')">All</button>
        <button class="filter-btn" :class="{ active: diffFilter === 'beginner' }" @click="diffFilter = 'beginner'" x-text="t('beginner')">Beginner</button>
        <button class="filter-btn" :class="{ active: diffFilter === 'intermediate' }" @click="diffFilter = 'intermediate'" x-text="t('intermediate')">Intermediate</button>
        <button class="filter-btn" :class="{ active: diffFilter === 'advanced' }" @click="diffFilter = 'advanced'" x-text="t('advanced')">Advanced</button>
      </div>
    </div>

    <!-- Result Summary -->
    <div class="result-summary" x-show="!loading">
      <span x-text="resultText"></span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button x-show="!showComingSoon" class="btn btn-sm btn-outline" style="color:var(--text-secondary);border-color:var(--border);" @click="showComingSoon = true" x-text="t('showComingSoon') + ' (+' + videos.filter(v=>v.comingSoon).length + ')'">Show Upcoming</button>
        <button x-show="showComingSoon" class="btn btn-sm btn-outline" style="color:var(--warning);border-color:var(--warning);" @click="showComingSoon = false" x-text="t('hideComingSoon')">Hide Upcoming</button>
        <button x-show="langFilter !== 'all' || diffFilter !== 'all' || searchQuery" class="btn btn-sm btn-outline" @click="clearFilters()" x-text="t('clearFilters')">Clear</button>
      </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" x-html="renderSpinner('加载视频中...')"></div>

    <!-- Empty -->
    <div x-show="!loading && filtered.length === 0" x-html="renderEmptyState('📭', '没有找到匹配的视频', '试试调整筛选条件')"></div>

    <!-- Video Grid -->
    <div class="video-grid" x-show="!loading && filtered.length > 0">
      <template x-for="v in filtered" :key="v.id">
        <div class="card video-card" :class="{ 'coming-soon': v.comingSoon }" @click="goTo('watch.html?id=' + v.id)">
          <div class="card-img-wrapper" :class="{ 'no-thumb': v._thumbFailed }">
            <img class="card-img" x-show="!v._thumbFailed"
              :src="v.thumbnail || (v.sourceId ? 'https://img.youtube.com/vi/' + v.sourceId + '/hqdefault.jpg' : '')"
              :alt="v.title" loading="lazy"
              @error="if (!v._thumbTriedMq) { v._thumbTriedMq = true; $el.src = 'https://img.youtube.com/vi/' + v.sourceId + '/mqdefault.jpg'; } else { v._thumbFailed = true; }">
            <div class="card-img-tag tag" :class="'tag-' + v.language" x-text="v.language === 'cantonese' ? '粤' : '普'"></div>
            <div class="card-duration" x-text="v.duration"></div>
            <div class="coming-soon-overlay" x-show="v.comingSoon">
              <span>即将上线</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" x-text="v.title"></div>
            <div class="card-desc" x-text="v.description"></div>
            <div class="card-meta">
              <span class="tag" :class="'tag-' + v.difficulty" x-text="diffLabel(v.difficulty)"></span>
              <span x-text="v.subtitle_cn"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar" x-data x-init="$el.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)})">
    <a class="tab-item active" href="index.html">
      <span class="tab-icon">🏠</span><span data-i18n="home">首页</span>
    </a>
    <a class="tab-item" href="vocabulary.html">
      <span class="tab-icon">📖</span><span data-i18n="vocab">生词</span>
    </a>
    <a class="tab-item" href="daily.html">
      <span class="tab-icon">🗣️</span><span data-i18n="daily">每日</span>
    </a>
    <a class="tab-item" href="profile.html">
      <span class="tab-icon">👤</span><span data-i18n="profile">我的</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components/ui.js"></script>
  <script src="js/data.js"></script>
  <script>
    function homePage() {
      return {
        videos: [],
        searchQuery: '',
        langFilter: 'all',
        diffFilter: 'all',
        showComingSoon: false,
        loading: true,

        async init() {
          this.videos = await loadVideos();
          this.loading = false;
          Alpine.store('user').init();
        },

        get lastWatchedProgress() {
          const lw = Storage.getLastWatched();
          if (!lw) return null;
          return lw;
        },

        get lastWatchedVideo() {
          const lw = Storage.getLastWatched();
          if (!lw) return null;
          return this.videos.find(v => v.id === lw.videoId) || null;
        },

        get lastWatchedPercent() {
          const p = this.lastWatchedProgress;
          if (!p || !p.total) return 0;
          return Math.round((p.index / (p.total - 1)) * 100);
        },

        get filtered() {
          let list = this.videos;
          if (!this.showComingSoon) {
            list = list.filter(v => !v.comingSoon);
          }
          if (this.langFilter !== 'all') {
            list = list.filter(v => v.language === this.langFilter);
          }
          if (this.diffFilter !== 'all') {
            list = list.filter(v => v.difficulty === this.diffFilter);
          }
          if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            list = list.filter(v =>
              v.title.toLowerCase().includes(q) ||
              (v.description || '').toLowerCase().includes(q) ||
              (v.subtitle_cn || '').toLowerCase().includes(q)
            );
          }
          return list;
        },

        get stats() {
          const total = this.videos.length;
          const mandarin = this.videos.filter(v => v.language === 'mandarin').length;
          const cantonese = this.videos.filter(v => v.language === 'cantonese').length;
          const levels = new Set(this.videos.map(v => v.difficulty)).size;
          const langParts = [];
          if (mandarin) langParts.push(mandarin + ' 普通话');
          if (cantonese) langParts.push(cantonese + ' 粤语');
          return { total, languages: langParts.join(' · '), levels };
        },

        get resultText() {
          const available = this.videos.filter(v => !v.comingSoon).length;
          const total = this.videos.length;
          const showing = this.filtered.length;
          const suffix = this.showComingSoon ? `（含 ${total - available} 个筹备中）` : '';
          if (this.langFilter === 'all' && this.diffFilter === 'all' && !this.searchQuery) {
            return `共 ${showing} 个视频${suffix}`;
          }
          return `找到 ${showing} 个视频`;
        },

        diffLabel(d) {
          const map = { beginner: '初级', intermediate: '中级', advanced: '高级' };
          return map[d] || d;
        },

        clearFilters() {
          this.searchQuery = '';
          this.langFilter = 'all';
          this.diffFilter = 'all';
        },
      };
    }
  </script>
</body>
</html>
